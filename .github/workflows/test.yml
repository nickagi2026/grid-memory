name: Grid Memory CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        cd sdk/python
        pip install -e ".[dev]"

    - name: Run Python tests
      run: |
        cd sdk/python
        python -m unittest discover tests -v

    - name: Run workspace proof suite
      run: |
        cd sdk/python
        python -m unittest tests.test_workspace_proof -v

    - name: Run backup fidelity proof suite
      run: |
        cd sdk/python
        python -m unittest tests.test_backup_fidelity -v

  node-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Run Node store tests
      run: |
        node tests/test-store.js

    - name: Start server for proxy tests
      run: |
        node server.js &
        sleep 2
        echo "Server up"

    - name: Run proxy and contract tests
      run: |
        GRID_URL=http://localhost:8080 node tests/test-openai-proxy.js
        GRID_URL=http://localhost:8080 node tests/test-contract.js

    - name: Stop server
      run: kill %1 2>/dev/null || true

  integration-tests:
    runs-on: ubuntu-latest
    needs: [python-tests, node-tests]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: grid_memory_test
          POSTGRES_USER: grid
          POSTGRES_PASSWORD: grid_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install PostgreSQL deps
      run: pip install psycopg2-binary

    - name: Run Postgres integration tests
      run: |
        cd sdk/python
        PG_HOST=localhost PG_DB=grid_memory_test PG_USER=grid PG_PASS=grid_test \
          python3 -m unittest tests.test_postgres -v

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install Python deps
      run: |
        cd sdk/python
        pip install -e ".[dev]"

    - name: Start Grid server
      run: |
        node server.js &
        sleep 2
        echo "Server started"

    - name: Run integration tests
      run: |
        cd sdk/python
        GRID_URL=http://localhost:8080 python -c "
        import unittest
        from tests.test_grid_memory import TestGridConnection
        from tests.test_openai_server import TestOpenAIProxyPython
        loader = unittest.TestLoader()
        suite = unittest.TestSuite()
        suite.addTests(loader.loadTestsFromTestCase(TestGridConnection))
        suite.addTests(loader.loadTestsFromTestCase(TestOpenAIProxyPython))
        runner = unittest.TextTestRunner(verbosity=2)
        result = runner.run(suite)
        exit(0 if result.wasSuccessful() else 1)
        "

    - name: Run Node SDK tests
      run: |
        sleep 1
        GRID_URL=http://localhost:8080 node --test sdk/node/test/grid.test.js || true

    - name: Run proxy tests
      run: |
        GRID_URL=http://localhost:8080 node tests/test-openai-proxy.js

    - name: Run contract tests
      run: |
        GRID_URL=http://localhost:8080 node tests/test-contract.js

    - name: Stop server
      run: kill %1 2>/dev/null || true

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Lint
      run: |
        pip install flake8
        flake8 sdk/python/ --max-line-length=120 --extend-ignore=E203,E501,W503
